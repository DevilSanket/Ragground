# yt-dlp configuration for Instagram Reels
# Place this file at: reels_pipeline/yt-dlp.conf

# ─── Output ───────────────────────────────────────────────────────────────────
# Save to downloads folder with reel ID as filename
-o downloads/%(id)s.%(ext)s

# ─── Format ───────────────────────────────────────────────────────────────────
# Best video quality (needed to extract audio via ffmpeg)
-f bestvideo+bestaudio/best

# ─── Metadata ─────────────────────────────────────────────────────────────────
# Write metadata JSON alongside each video
--write-info-json

# Write thumbnail image
--write-thumbnail

# ─── Network ──────────────────────────────────────────────────────────────────
# Retry on failure
--retries 5

# Wait between downloads to avoid rate limiting (in seconds)
--sleep-interval 3
--max-sleep-interval 8

# ─── Cookies (Required for Instagram auth) ────────────────────────────────────
# Uncomment ONE of the following:

# Option A: Export cookies from browser (recommended)
# --cookies cookies.txt

# Option B: Use cookies directly from your browser session
# --cookies-from-browser chrome
# --cookies-from-browser firefox
# --cookies-from-browser edge

# ─── Subtitles ────────────────────────────────────────────────────────────────
# Download auto-generated subtitles if available (bonus)
--write-auto-subs
--sub-langs en

# ─── Misc ─────────────────────────────────────────────────────────────────────
# Skip already downloaded files
--no-overwrites

# Show progress
--progress

# Embed metadata into file
--add-metadata
